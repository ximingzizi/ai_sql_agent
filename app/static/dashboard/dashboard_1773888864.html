<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>数据仪表盘</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body>

<h2 id="title"></h2>

<div id="trend" style="width: 600px;height:400px;"></div>
<div id="pie" style="width: 600px;height:400px;"></div>
<div id="top" style="width: 600px;height:400px;"></div>

<script>

const data = {"title": "2023年9月订单销售情况", "charts": [{"type": "bar", "title": "日销售额分布", "x": ["9月5日", "9月8日", "9月12日", "9月15日", "9月18日", "9月20日", "9月22日", "9月25日", "9月28日", "9月30日"], "y": [999.0, 6598.0, 18999.0, 2298.0, 8999.0, 3699.0, 8998.0, 31298.0, 17298.0, 1698.0]}]};
// 设置标题
document.getElementById("title").innerText = data.title;
// 遍历 charts
data.charts.forEach(chart => {

    if (chart.type === "line") {
        var trend = echarts.init(document.getElementById('trend'));
        trend.setOption({
            title: { text: chart.title },
            xAxis: { type: 'category', data: chart.x },
            yAxis: { type: 'value' },
            series: [{
                data: chart.y,
                type: 'line'
            }]
        });
    }

    if (chart.type === "pie") {
        var pie = echarts.init(document.getElementById('pie'));
        pie.setOption({
            title: { text: chart.title },
            series: [{
                type: 'pie',
                data: chart.data
            }]
        });
    }

    if (chart.type === "bar") {
        var top = echarts.init(document.getElementById('top'));
        top.setOption({
            title: { text: chart.title },
            xAxis: { type: 'category', data: chart.x },
            yAxis: { type: 'value' },
            series: [{
                type: 'bar',
                data: chart.y
            }]
        });
    }

});

</script>

</body>
</html>
